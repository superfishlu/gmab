name: Publish to PyPI

on:
  # Trigger directly on the version tag push. (The old `release: created`
  # trigger never fired: releases created by release.yml use the automatic
  # GITHUB_TOKEN, and GitHub does not start workflows from GITHUB_TOKEN events.)
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # allow manual re-runs from the Actions tab / gh

jobs:
  deploy:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      # Required for PyPI publishing
      id-token: write  # For trusted publishing
      contents: read   # For checkout
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel twine
      
      - name: Build distributions
        run: |
          python -m build
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted publishing - no username/password needed
        # Requires PyPI API token configured via GitHub repository settings